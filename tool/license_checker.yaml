# Config for `dart pub global run license_checker:license_checker check-licenses`
# (see .github/workflows/build-apk.yml). Dependencies here are OSS libraries
# pulled into the app at build time — none of Tether's own source is
# affected by this list.
permittedLicenses:
  - MIT
  - BSD-2-Clause
  - BSD-3-Clause
  - Apache-2.0
  - ISC
  - Zlib
  - MPL-2.0
  - Unlicense
  - PSF-2.0
  - BSL-1.0

rejectedLicenses:
  - GPL-2.0
  - GPL-3.0
  - AGPL-3.0
  - SSPL-1.0
  - CC-BY-NC-4.0

# Flutter-SDK-bundled packages, not third-party dependencies — the tool
# can't resolve their license file from this checkout layout, and
# flutter_test/flutter_web_plugins ship no separate LICENSE at all (BSD-3
# via the Flutter SDK's top-level LICENSE). Re-verify this list any time
# `flutter analyze`'s dependency tree changes noticeably.
approvedPackages:
  MIT-Modern-Variant:
    - sky_engine
  no-file:
    - flutter_test
    - flutter_web_plugins
