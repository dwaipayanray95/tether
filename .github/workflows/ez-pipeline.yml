name: 'EZ All-in-One Pipeline'

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    types: [opened, synchronize, reopened]

# ---------------------------------------------------------
# ⚙️ EASY CONFIGURATION
# Set the platforms you want to build to 'true' or 'false'
# ---------------------------------------------------------
env:
  BUILD_ANDROID_APK: 'false'
  BUILD_ANDROID_AAB: 'true'
  BUILD_WEB: 'false'
  BUILD_MACOS: 'false'
  BUILD_WINDOWS: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  pr-check:
    name: PR Verification
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR Pilot Size Labeler
        uses: ./actions/pr-pilot

      - name: Run Security Scan
        uses: ./actions/security-scan

      - name: Scan Licenses
        uses: ./actions/license-guard
        with:
          fail-on-violation: 'false'

  # Setup job parses the top-level env variables so they can be used in job-level `if` conditions
  setup:
    name: Parse Configuration
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      apk: ${{ steps.cfg.outputs.apk }}
      aab: ${{ steps.cfg.outputs.aab }}
      web: ${{ steps.cfg.outputs.web }}
      macos: ${{ steps.cfg.outputs.macos }}
      windows: ${{ steps.cfg.outputs.windows }}
    steps:
      - id: cfg
        run: |
          echo "apk=${{ env.BUILD_ANDROID_APK }}" >> "$GITHUB_OUTPUT"
          echo "aab=${{ env.BUILD_ANDROID_AAB }}" >> "$GITHUB_OUTPUT"
          echo "web=${{ env.BUILD_WEB }}" >> "$GITHUB_OUTPUT"
          echo "macos=${{ env.BUILD_MACOS }}" >> "$GITHUB_OUTPUT"
          echo "windows=${{ env.BUILD_WINDOWS }}" >> "$GITHUB_OUTPUT"

  release-management:
    name: Release Notes & Changelog
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Security Scan Verification
        uses: ./actions/security-scan

      - name: Verify Package Licenses
        uses: ./actions/license-guard
        with:
          fail-on-violation: 'true'

      - name: Generate AI Release Notes
        uses: ./actions/ai-release-notes
        with:
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          publish: 'true'

      - name: Update Changelog
        uses: ./actions/auto-changelog
        with:
          commit-changes: 'true'

  build-ubuntu:
    name: Build Android & Web
    needs: setup
    if: needs.setup.outputs.apk == 'true' || needs.setup.outputs.aab == 'true' || needs.setup.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Android App (APK)
        if: env.BUILD_ANDROID_APK == 'true'
        uses: ./actions/flutter-build
        with:
          platform: 'android-apk'
          split-apk: 'true'

      - name: Build Android App (AAB)
        if: env.BUILD_ANDROID_AAB == 'true'
        uses: ./actions/flutter-build
        with:
          platform: 'android-aab'

      - name: Build Web App
        if: env.BUILD_WEB == 'true'
        uses: ./actions/flutter-build
        with:
          platform: 'web'

  build-macos:
    name: Build macOS
    needs: setup
    if: needs.setup.outputs.macos == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build macOS App
        uses: ./actions/flutter-build
        with:
          platform: 'macos'

  build-windows:
    name: Build Windows
    needs: setup
    if: needs.setup.outputs.windows == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Windows App
        uses: ./actions/flutter-build
        with:
          platform: 'windows'
