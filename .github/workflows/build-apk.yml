name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build arm64-v8a Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Restore Keystore & Configuration Secrets
        env:
          NOTIFICATION_CONFIG: ${{ secrets.NOTIFICATION_CONFIG_DART }}
          ENV_CONFIG: ${{ secrets.ENV_CONFIG_DART }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          # 1. Restore FCM Notification Config
          mkdir -p lib/config
          if [ ! -z "$NOTIFICATION_CONFIG" ]; then
            echo "$NOTIFICATION_CONFIG" > lib/config/notification_config.dart
          else
            echo "class NotificationConfig {" > lib/config/notification_config.dart
            echo "  static const projectId = 'tether-8d3fa';" >> lib/config/notification_config.dart
            echo "  static const clientEmail = 'dummy@tether-8d3fa.iam.gserviceaccount.com';" >> lib/config/notification_config.dart
            echo "  static const privateKey = '-----BEGIN PRIVATE KEY-----\nIA==\n-----END PRIVATE KEY-----\n';" >> lib/config/notification_config.dart
            echo "}" >> lib/config/notification_config.dart
          fi

          # 2. Restore Environment Config
          if [ ! -z "$ENV_CONFIG" ]; then
            echo "$ENV_CONFIG" > lib/config/env_config.dart
          else
            echo "class EnvConfig {" > lib/config/env_config.dart
            echo "  static const allowedEmails = ['user1@example.com', 'user2@example.com'];" >> lib/config/env_config.dart
            echo "  static const coupleId = 'dummy-couple-id';" >> lib/config/env_config.dart
            echo "}" >> lib/config/env_config.dart
          fi

          # 3. Restore Signing Configuration
          if [ ! -z "$KEYSTORE_BASE64" ] && [ ! -z "$KEY_PROPERTIES" ]; then
            echo "$KEY_PROPERTIES" > android/key.properties
            # Update storeFile path to be relative for the GitHub runner container
            sed -i 's|storeFile=.*|storeFile=tether-release.jks|g' android/key.properties
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/tether-release.jks
          fi

      - name: Get Dependencies
        run: flutter pub get

      - name: Build arm64-v8a APK
        run: flutter build apk --target-platform android-arm64 --split-per-abi

      - name: Rename APK file
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/Tether_${{ github.ref_name }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tether_${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/Tether_${{ github.ref_name }}.apk
          if-no-files-found: error

      - name: Generate Custom Git Changelog
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Ensure git history and tags are fetched
          git fetch --tags --unshallow || git fetch --tags || true
          
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          echo "## Tether Release Details" > changelog.md
          echo "" >> changelog.md
          
          # Create temporary files for categorization
          touch feats.txt fixes.txt ui.txt perf.txt others.txt
          
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"%s (%h)" HEAD > commits.txt
          else
            git log --pretty=format:"%s (%h)" ${PREV_TAG}..HEAD > commits.txt
          fi
          
          # Parse and sort commits
          while IFS= read -r line; do
            lower_line=$(echo "$line" | tr '[:upper:]' '[:lower:]')
            if [[ "$lower_line" =~ (feat|add|new|🚀|✨) ]]; then
              echo "* $line" >> feats.txt
            elif [[ "$lower_line" =~ (fix|bug|patch|crash|issue|🐛|🔧) ]]; then
              echo "* $line" >> fixes.txt
            elif [[ "$lower_line" =~ (ui|style|color|theme|design|layout|🎨) ]]; then
              echo "* $line" >> ui.txt
            elif [[ "$lower_line" =~ (refactor|perf|clean|chore|opt|⚡) ]]; then
              echo "* $line" >> perf.txt
            else
              echo "* $line" >> others.txt
            fi
          done < commits.txt
          
          # Build beautiful markdown structure
          if [ -s feats.txt ]; then
            echo "### 🚀 Features & Enhancements" >> changelog.md
            cat feats.txt >> changelog.md
            echo "" >> changelog.md
          fi
          
          if [ -s fixes.txt ]; then
            echo "### 🐛 Bug Fixes" >> changelog.md
            cat fixes.txt >> changelog.md
            echo "" >> changelog.md
          fi
          
          if [ -s ui.txt ]; then
            echo "### 🎨 UI & Layout" >> changelog.md
            cat ui.txt >> changelog.md
            echo "" >> changelog.md
          fi
          
          if [ -s perf.txt ]; then
            echo "### ⚡ Performance & Refactoring" >> changelog.md
            cat perf.txt >> changelog.md
            echo "" >> changelog.md
          fi
          
          if [ -s others.txt ]; then
            echo "### 📝 Other Changes" >> changelog.md
            cat others.txt >> changelog.md
            echo "" >> changelog.md
          fi
          
          # Clean up temporary logs
          rm -f feats.txt fixes.txt ui.txt perf.txt others.txt commits.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/Tether_${{ github.ref_name }}.apk
          draft: false
          prerelease: false
          body_path: changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
