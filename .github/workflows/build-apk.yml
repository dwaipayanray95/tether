name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $HOME/tether-release.jks
          ls -la $HOME/tether-release.jks

      - name: Decode notification config
        run: |
          mkdir -p lib/config
          echo "${{ secrets.NOTIFICATION_CONFIG_BASE64 }}" | base64 --decode > lib/config/notification_config.dart

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Write key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=tether" >> android/key.properties
          echo "storeFile=$HOME/tether-release.jks" >> android/key.properties

      - name: Verify keystore
        run: |
          keytool -list -keystore $HOME/tether-release.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -alias tether

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: tether-release-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Tether ${{ github.ref_name }}
          files: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
