name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build arm64-v8a Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Restore Keystore & Configuration Secrets
        env:
          NOTIFICATION_CONFIG: ${{ secrets.NOTIFICATION_CONFIG_DART }}
          ENV_CONFIG: ${{ secrets.ENV_CONFIG_DART }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          # 1. Restore FCM Notification Config
          mkdir -p lib/config
          if [ ! -z "$NOTIFICATION_CONFIG" ]; then
            echo "$NOTIFICATION_CONFIG" > lib/config/notification_config.dart
          else
            echo "class NotificationConfig {" > lib/config/notification_config.dart
            echo "  static const projectId = 'tether-8d3fa';" >> lib/config/notification_config.dart
            echo "  static const clientEmail = 'dummy@tether-8d3fa.iam.gserviceaccount.com';" >> lib/config/notification_config.dart
            echo "  static const privateKey = '-----BEGIN PRIVATE KEY-----\nIA==\n-----END PRIVATE KEY-----\n';" >> lib/config/notification_config.dart
            echo "}" >> lib/config/notification_config.dart
          fi

          # 2. Restore Environment Config
          if [ ! -z "$ENV_CONFIG" ]; then
            echo "$ENV_CONFIG" > lib/config/env_config.dart
          else
            echo "class EnvConfig {" > lib/config/env_config.dart
            echo "  static const allowedEmails = ['user1@example.com', 'user2@example.com'];" >> lib/config/env_config.dart
            echo "  static const coupleId = 'dummy-couple-id';" >> lib/config/env_config.dart
            echo "}" >> lib/config/env_config.dart
          fi

          # 3. Restore Signing Configuration
          if [ ! -z "$KEYSTORE_BASE64" ] && [ ! -z "$KEY_PROPERTIES" ]; then
            echo "$KEY_PROPERTIES" > android/key.properties
            # Update storeFile path to be relative for the GitHub runner container
            sed -i 's|storeFile=.*|storeFile=tether-release.jks|g' android/key.properties
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/tether-release.jks
          fi

      - name: Get Dependencies
        run: flutter pub get

      - name: Build arm64-v8a APK
        run: flutter build apk --target-platform android-arm64 --split-per-abi

      - name: Rename APK file
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/Tether_${{ github.ref_name }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tether_${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/Tether_${{ github.ref_name }}.apk
          if-no-files-found: error

      - name: Build Changelog
        if: startsWith(github.ref, 'refs/tags/v')
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release Draft
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/Tether_${{ github.ref_name }}.apk
          draft: true
          prerelease: false
          body: ${{ steps.build_changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
