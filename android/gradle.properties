org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# opus_flutter_android hardcodes minSdkVersion=19 in its own build.gradle.
# Our app enforces minSdk=21 (build.gradle.kts), so devices below 21 can never
# install the app — the plugin's 19 never takes effect at runtime. Suppress the
# NDK CXX1110 check that fires on the plugin subproject.
android.ndk.suppressMinSdkVersionError=21
