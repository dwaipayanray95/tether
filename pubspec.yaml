name: tether
description: "Tether - Raayyy & Aproo"
publish_to: 'none'
version: 2.5.25+84

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: 4.11.0
  firebase_auth: 6.5.4
  cloud_firestore: 6.6.0
  firebase_database: 12.4.4
  firebase_storage: 13.4.3
  firebase_messaging: 16.4.1
  google_sign_in: ^7.2.0

  # UI & Navigation
  google_fonts: ^8.1.0
  go_router: ^17.3.0
  animations: ^2.0.11

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  image_picker: ^1.2.3
  cached_network_image: ^3.4.1
  timeago: ^3.7.0
  uuid: ^4.5.1
  package_info_plus: ^10.2.0
  dio: ^5.10.0
  open_file: ^4.0.0
  path_provider: ^2.1.6
  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.3
  dart_jsonwebtoken: ^3.4.1
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_markdown: ^0.7.7+1
  geocoding: ^5.0.0
  permission_handler: ^12.0.3
  scrollable_positioned_list: ^0.3.8
  share_plus: ^13.2.0
  cryptography: ^2.9.0
  flutter_secure_storage: ^10.3.1
  flutter_sound: ^9.30.0
  record: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

dependency_overrides:
  record_linux: ^2.1.0
