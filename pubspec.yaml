name: tether
description: "Tether - Raayyy & Aproo"
publish_to: 'none'
version: 1.1.7+17

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  google_sign_in: ^6.3.0

  # UI & Navigation
  google_fonts: ^8.1.0
  go_router: ^17.2.3
  animations: ^2.0.11

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  timeago: ^3.7.0
  uuid: ^4.5.1
  package_info_plus: ^8.0.0
  dio: ^5.7.0
  open_file: ^3.3.2
  path_provider: ^2.1.5
  google_maps_flutter: ^2.9.0
  geolocator: ^14.0.2
  dart_jsonwebtoken: ^3.4.1
  flutter_local_notifications: ^18.0.1
  geocoding: ^4.0.0
  permission_handler: ^12.0.1
  scrollable_positioned_list: ^0.3.8
  firebase_database: ^12.3.0
  flutter_webrtc: ^0.12.1
  flutter_callkit_incoming: ^2.0.2+2
  socket_io_client: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
