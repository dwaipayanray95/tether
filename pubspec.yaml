name: tether
description: "Tether - Raayyy & Aproo"
publish_to: 'none'
version: 3.3.6+95

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1
  firebase_messaging: ^16.4.3
  cloud_functions: ^6.0.4
  google_sign_in: ^7.2.0

  # UI & Navigation
  google_fonts: ^8.1.0

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  image_picker: ^1.2.3
  cached_network_image: ^3.4.1
  timeago: ^3.7.0
  uuid: ^4.5.1
  package_info_plus: ^10.2.0
  dio: ^5.10.0
  open_file: ^4.0.0
  path_provider: ^2.1.6
  dart_jsonwebtoken: ^3.4.1
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_markdown: ^0.7.7+1
  permission_handler: ^12.0.3
  scrollable_positioned_list: ^0.3.8
  share_plus: ^13.2.0
  cryptography: ^2.9.0
  flutter_secure_storage: ^10.3.1
  flutter_sound: ^9.30.0
  record: ^7.1.1

  # Local-first on-device database (chat/todo/sticky-notes source of truth,
  # fed by a Firestore sync listener; Firestore itself stays a pure
  # real-time relay — see AGENTS.md "Local-first architecture" section)
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.6.0+eol
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.28.2
  build_runner: ^2.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

dependency_overrides:
  record_linux: ^2.1.0
