name: tether
description: "Tether - Ray & Aproo"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5
  google_sign_in: ^6.2.2

  # UI & Navigation
  google_fonts: ^6.2.1
  go_router: ^14.6.2
  animations: ^2.0.11

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  timeago: ^3.7.0
  uuid: ^4.5.1
  package_info_plus: ^8.0.0
  dio: ^5.7.0
  open_file: ^3.3.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
